<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Page 3</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-y: auto; /* Allow vertical scrolling */
        }
        .pdf-embed {
            width: 100%;
            height: 100%;
        }
        #pdf-viewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; /* Add space between pages */
            padding: 20px;
        }
        canvas {
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            color: #333;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 8px 12px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">back</a>
    <div id="pdf-viewer"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
    <script>
        // Specify the PDF file
        const url = 'page/page3.pdf';

        const viewer = document.getElementById('pdf-viewer');

        function renderPdf() {
            // Asynchronously download PDF
            const loadingTask = pdfjsLib.getDocument(url);
            loadingTask.promise.then(function(pdf) {
                console.log('PDF loaded');
                viewer.innerHTML = ''; // Clear previous renders

                const renderPromises = [];

                // Get the available width for the PDF pages
                // Use a fallback width if clientWidth is 0
                const availableWidth = viewer.clientWidth > 0 ? viewer.clientWidth - 40 : 800; // Subtract horizontal padding

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const promise = pdf.getPage(pageNum).then(function(page) {
                        const unscaledViewport = page.getViewport({ scale: 1 });
                        const scale = availableWidth / unscaledViewport.width;
                        const viewport = page.getViewport({ scale: scale });

                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        
                        viewer.appendChild(canvas);

                        const renderContext = {
                            canvasContext: context,
                            viewport: viewport
                        };
                        return page.render(renderContext).promise;
                    });
                    renderPromises.push(promise);
                }
                
                Promise.all(renderPromises).then(() => {
                    console.log('All pages rendered.');
                });

            }, function (reason) {
                console.error(reason);
            });
        }

        renderPdf(); // Initial render

        // Re-render on window resize for full responsiveness
        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(renderPdf, 250); // Debounce resize event
        });
    </script>
</body>
</html>
